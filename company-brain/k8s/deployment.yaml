apiVersion: apps/v1
kind: Deployment

metadata:
  name: company-brain

spec:
  replicas: 2

  selector:
    matchLabels:
      app: company-brain

  template:
    metadata:
      labels:
        app: company-brain

    spec:
      containers:
      - name: company-brain
        image: company-brain:v1

        ports:
        - containerPort: 8000

        livenessProbe:
          httpGet:
            path: /health
            port: 8000

        readinessProbe:
          httpGet:
            path: /health
            port: 8000

        volumeMounts:
          - name: company-storage
            mountPath: /data
      
      volumes:
        - name: company-storage
          persistentVolumeClaim:
            claimName: company-brain-pvc