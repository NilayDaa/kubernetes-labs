name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/company-brain-ai:latest .

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/company-brain-ai:latest

    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Deploy to Kubernetes
      run: |
        helm upgrade --install company-brain ./company-brain \
          --set image.repository=${{ secrets.DOCKER_USERNAME }}/company-brain-ai \
          --set image.tag=latest